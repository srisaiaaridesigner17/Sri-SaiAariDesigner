name: Keep Alive Render Bot
on:
  schedule:
    # Run every 5 minutes to prevent Render free tier from sleeping (it sleeps after 15m)
    # Using 5 minutes because GitHub Actions queues are often delayed.
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send Stay-Awake Request
        run: |
          URL="https://www.srisaifashion.shop" 
          if [ -n "${{ secrets.RENDER_URL }}" ]; then
            URL="${{ secrets.RENDER_URL }}"
          fi
          echo "Pinging ${URL} to keep it awake..."
          curl -s "${URL}/api/ping" || echo "Ping failed, but checking health..."
          curl -s "${URL}/api/health" || echo "Health check failed."
