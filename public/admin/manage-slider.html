<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Slider | Sri & Sai Aari Fashion Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin-dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .slide-item {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: relative;
        }
        .slide-preview {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
        }
        .slide-actions {
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .upload-zone {
            border: 2px dashed #ddd;
            padding: 40px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 30px;
        }
        .upload-zone:hover {
            border-color: var(--primary-color);
            background: #fff9f0;
        }
        .slide-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <h2>Admin Panel</h2>
            <ul style="list-style: none;">
                <li><a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                <li><a href="orders.html"><i class="fas fa-shopping-cart"></i> Orders</a></li>
                <li><a href="add-product.html"><i class="fas fa-plus"></i> Add Product</a></li>
                <li><a href="manage-boutique.html"><i class="fas fa-tshirt"></i> Manage Boutique</a></li>
                <li><a href="manage-parlour.html"><i class="fas fa-spa"></i> Manage Beauty Parlour</a></li>
                <li><a href="manage-slider.html" class="active"><i class="fas fa-images"></i> Manage Slider</a></li>
                <li><a href="manage-courses.html"><i class="fas fa-graduation-cap"></i> Manage Courses</a></li>
                <li><a href="../index.html"><i class="fas fa-home"></i> Go to Home Page</a></li>
                <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <h1 class="section-title" style="text-align: left;">Manage Hero Slider</h1>
            
            <div class="admin-card">
                <h3>Upload New Slide</h3>
                <div class="upload-zone" onclick="document.getElementById('slide-file').click()">
                    <i class="fas fa-cloud-upload-alt" style="font-size: 3rem; color: #ccc; margin-bottom: 15px;"></i>
                    <p>Click to upload Image</p>
                    <small>Supports: JPG, PNG, WEBP</small>
                    <input type="file" id="slide-file" accept="image/*" style="display: none;">
                </div>
                <div id="upload-status"></div>
            </div>

            <div class="admin-card">
                <h3>Current Slides</h3>
                <div class="slide-grid" id="current-slides-grid">
                    <!-- Slides loaded here -->
                </div>
            </div>
        </main>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadHeroSlides();

            document.getElementById('slide-file').addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const status = document.getElementById('upload-status');
                status.innerHTML = '<p style="color: blue;">Uploading to Cloudinary...</p>';

                const formData = new FormData();
                formData.append('image', file);
                
                try {
                    await window.api.addSlider(formData);
                    status.innerHTML = '<p style="color: green;">✅ Slide added successfully!</p>';
                    loadHeroSlides();
                    setTimeout(() => status.innerHTML = '', 3000);
                } catch (err) {
                    status.innerHTML = '<p style="color: red;">❌ Failed to upload: ' + err.message + '</p>';
                }
            });
        });

        async function loadHeroSlides() {
            if (!window.api) return;
            try {
                const slides = await window.api.getSliders();
                const grid = document.getElementById('current-slides-grid');
                
                if (!slides || slides.length === 0) {
                    grid.innerHTML = '<p style="color: #888; grid-column: 1/-1; text-align: center; padding: 40px;">No slides found. Using default images.</p>';
                    return;
                }

                grid.innerHTML = slides.map((slide) => `
                    <div class="slide-item">
                        <img src="${slide.image}" class="slide-preview">
                        <div class="slide-actions">
                            <span class="badge" style="background: #eee; color: #666;">IMAGE</span>
                            <button onclick="handleDeleteSlide('${slide._id}')" class="btn" style="background: #e54c4c; padding: 5px 10px; font-size: 0.8rem;">Delete</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        window.handleDeleteSlide = async (id) => {
            if (!confirm('Remove this slide?')) return;
            try {
                await window.api.deleteSlider(id);
                loadHeroSlides();
            } catch (err) {
                alert('Error deleting slide');
            }
        };
    </script>
</body>
</html>
