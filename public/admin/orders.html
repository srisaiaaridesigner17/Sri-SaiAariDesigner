<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin-dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="../images/sri-logo2.png">
</head>
<body>

    <div class="admin-layout">
        <aside class="sidebar">
            <h2>Admin Panel</h2>
            <ul style="list-style: none;">
                <li><a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                <li><a href="orders.html" class="active"><i class="fas fa-shopping-cart"></i> Orders</a></li>
                <li><a href="add-product.html"><i class="fas fa-plus"></i> Add Product</a></li>
                <li><a href="manage-boutique.html"><i class="fas fa-tshirt"></i> Manage Boutique</a></li>
                <li><a href="manage-parlour.html"><i class="fas fa-spa"></i> Manage Beauty Parlour</a></li>
                <li><a href="manage-slider.html"><i class="fas fa-images"></i> Manage Slider</a></li>
                <li><a href="manage-courses.html"><i class="fas fa-graduation-cap"></i> Manage Courses</a></li>
                <li><a href="../index.html"><i class="fas fa-home"></i> Go to Home Page</a></li>
                <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1 class="section-title" style="text-align: left; margin: 0;">Customer Orders</h1>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <label for="status-filter" style="font-weight: 700; color: var(--primary-color);">Filter:</label>
                    <select id="status-filter" onchange="filterOrdersByStatus(this.value)" style="padding: 10px 15px; border-radius: 8px; border: 1px solid #ddd; background-color: #fff; font-family: inherit; cursor: pointer;">
                        <option value="All">All Categories</option>
                        <option value="Pending">Pending</option>
                        <option value="Processing">Processing</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>
            </div>
            
            <div class="admin-card">
                <div style="overflow-x: auto;">
                    <table class="admin-table" id="all-orders-table">
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Customer Details</th>
                                <th>Items</th>
                                <th>Total Amount</th>
                                <th>Payment</th>
                                <th>Order Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="orders-body">
                            <tr><td colspan="7">Loading orders...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
             checkAuth();
             loadAllOrders();
        });
    </script>
</body>
</html>
