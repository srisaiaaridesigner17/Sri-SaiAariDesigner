<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Sri & Sai Aari Fashion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 60px auto;
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid #eee;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-header h1 {
            font-family: 'Playfair Display', serif;
            color: var(--primary-color);
            margin-bottom: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
        }
        .btn-auth {
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        .message-box {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }
        .error-msg { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
        .success-msg { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }

        .password-field-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-field-container input {
            padding-right: 45px !important;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            color: #888;
            cursor: pointer;
            z-index: 10;
            padding: 5px;
            font-size: 1.1rem;
            transition: color 0.3s ease;
        }

        .password-toggle:hover {
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <header>
        <div class="container navbar">
            <a href="index.html" class="logo">
                <img src="./images/sri-logo2.png" alt="Sri & Sai Aari Fashion" class="logo-img">
                Sri & Sai Aari Fashion
            </a>
        </div>
    </header>

    <div class="container">
        <div class="auth-container">
            <div class="auth-header">
                <h1>Reset Password</h1>
                <p>Enter your new password below</p>
            </div>
            
            <div id="reset-msg" class="message-box"></div>

            <form id="reset-form">
                <div class="form-group">
                    <label>New Password</label>
                    <div class="password-field-container">
                        <input type="password" id="new-password" required minlength="6">
                        <i class="fas fa-eye password-toggle" onclick="togglePasswordVisibility('new-password', this)"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="password-field-container">
                        <input type="password" id="confirm-password" required minlength="6">
                        <i class="fas fa-eye password-toggle" onclick="togglePasswordVisibility('confirm-password', this)"></i>
                    </div>
                </div>
                <button type="submit" class="btn-auth">Update Password</button>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        if (!token) {
            document.body.innerHTML = '<div class="container" style="text-align:center; padding:100px;"><h2>Invalid Request</h2><p>No reset token found.</p><a href="login.html">Back to Login</a></div>';
        }

        function showMessage(msg, type) {
            const el = document.getElementById('reset-msg');
            el.innerText = msg;
            el.className = 'message-box ' + (type === 'error' ? 'error-msg' : 'success-msg');
            el.style.display = 'block';
        }

        function togglePasswordVisibility(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;

            if (password !== confirm) {
                showMessage('Passwords do not match!', 'error');
                return;
            }

            try {
                const res = await window.api.resetPassword(token, password);
                if (res.message.includes('successfully')) {
                    showMessage('Password updated! Redirecting to login...', 'success');
                    setTimeout(() => window.location.href = 'login.html', 3000);
                } else {
                    showMessage(res.message || 'Reset failed', 'error');
                }
            } catch (err) {
                showMessage('Server error. Link might be expired.', 'error');
            }
        });
    </script>
</body>
</html>
